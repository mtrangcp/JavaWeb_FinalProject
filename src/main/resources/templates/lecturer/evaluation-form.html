<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nhập đánh giá</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container py-4">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">📝 Nhập đánh giá tư vấn</h5>
        </div>
        <div class="card-body">
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/lecturer/sessions/evaluate}"
                  th:object="${evaluationDTO}" method="post">

                <input type="hidden" th:field="*{sessionId}" th:value="${sessionId}">

                <div class="mb-3">
                    <label class="form-label">Điểm đánh giá (1-10) <span class="text-danger">*</span></label>
                    <input type="number" th:field="*{score}" class="form-control"
                           min="1" max="10"
                           th:classappend="${#fields.hasErrors('score')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{score}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nhận xét</label>
                    <textarea th:field="*{comment}" class="form-control" rows="4"></textarea>
                </div>

                <!-- Chọn thiết bị cấp phát -->
                <div class="mb-3">
                    <label class="form-label">Thiết bị/Tài liệu cấp cho sinh viên</label>
                    <table class="table table-bordered">
                        <thead class="table-light">
                        <tr>
                            <th>Thiết bị</th>
                            <th>Tồn kho</th>
                            <th>Số lượng cấp</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="eq, stat : ${equipments}">
                            <td th:text="${eq.name}"></td>
                            <td th:text="${eq.quantity} + ' ' + ${eq.unit}"></td>
                            <td>
                                <!-- Truyền equipmentId -->
                                <input type="hidden"
                                       th:name="'equipmentIds[' + ${stat.index} + ']'"
                                       th:value="${eq.id}">
                                <!-- Số lượng muốn cấp -->
                                <input type="number"
                                       th:name="'quantities[' + ${stat.index} + ']'"
                                       class="form-control form-control-sm"
                                       value="0" min="0"
                                       th:max="${eq.quantity}"
                                       style="width: 80px">
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <button type="submit" class="btn btn-success w-100">Lưu đánh giá & Tạo phiếu mượn</button>
                <a th:href="@{/lecturer/sessions}" class="btn btn-secondary w-100 mt-2">Hủy</a>
            </form>
        </div>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
