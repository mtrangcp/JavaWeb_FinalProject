<!doctype html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4">📝 Đăng ký tài khoản</h4>
                    <!-- Lỗi -->
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">


                        <div class="mb-3">
                            <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{fullName}" class="form-control"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>


                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{username}" class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>

                        <!-- Mật khẩu -->
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>

                        <!-- Xác nhận mật khẩu -->
                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{confirmPassword}" class="form-control"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                        </div>


                        <div class="mb-3">
                            <label class="form-label">Vai trò <span class="text-danger">*</span></label>
                            <select th:field="*{role}" class="form-select"
                                    th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'"
                                    onchange="toggleStudentFields(this.value)">
                                <option value="">-- Chọn vai trò --</option>
                                <option th:each="role : ${roles}"
                                        th:value="${role}"
                                        th:text="${role == T(com.btvn.projectfinal.model.entity.User.Role).STUDENT ? 'Sinh viên' : 'Giảng viên'}">
                                </option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{role}"></div>
                        </div>

                        <!-- Phần chỉ hiện khi chọn STUDENT -->
                        <div id="studentFields" style="display: none">
                            <div class="mb-3">
                                <label class="form-label">Mã số sinh viên</label>
                                <div id="studentIdField">
                                    <input type="text" th:field="*{studentId}" class="form-control"
                                           placeholder="VD: 21110001">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Khoa/Ngành</label>
                                <select th:field="*{departmentId}" class="form-select">
                                    <option value="">-- Chọn Khoa/Ngành --</option>
                                    <option th:each="dept : ${departments}"
                                            th:value="${dept.id}"
                                            th:text="${dept.name}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Đăng ký</button>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleStudentFields(role) {
        const fields = document.getElementById('studentFields');
        const studentIdField = document.getElementById('studentIdField');

        if (role === 'STUDENT') {
            fields.style.display = 'block';
            studentIdField.style.display = 'block';
        } else if (role === 'LECTURER') {
            fields.style.display = 'block';
            studentIdField.style.display = 'none';
        } else {
            fields.style.display = 'none';
        }
    }

    window.onload = function () {
        const roleSelect = document.querySelector('select[name="role"]');
        if (roleSelect) toggleStudentFields(roleSelect.value);
    };
</script>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
