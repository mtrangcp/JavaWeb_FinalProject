<!doctype html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile - Edit</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">👤 Hồ sơ cá nhân</h5>
                </div>
                <div class="card-body">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                    <form th:action="@{/profile}" th:object="${profileDTO}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" th:field="*{phone}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" th:field="*{address}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Giới tính</label>
                            <select th:field="*{gender}" class="form-select">
                                <option value="">-- Chọn --</option>
                                <option value="MALE">Nam</option>
                                <option value="FEMALE">Nữ</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>

                        <!-- Chỉ hiện cho STUDENT -->
                        <div th:if="${profile.user.role.name() == 'STUDENT'}">
                            <div class="mb-3">
                                <label class="form-label">Mã số sinh viên</label>
                                <input type="text" th:field="*{studentId}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Khoa/Ngành</label>
                                <select th:field="*{departmentId}" class="form-select">
                                    <option value="">-- Chọn Khoa --</option>
                                    <option th:each="dept : ${departments}"
                                            th:value="${dept.id}"
                                            th:text="${dept.name}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Chỉ hiện cho LECTURER -->
                        <div th:if="${profile.user.role.name() == 'LECTURER'}">
                            <div class="mb-3">
                                <label class="form-label">Học hàm/Học vị</label>
                                <select th:field="*{academicRank}" class="form-select">
                                    <option value="">-- Chọn --</option>
                                    <option value="GS">Giáo sư (GS)</option>
                                    <option value="PGS">Phó Giáo sư (PGS)</option>
                                    <option value="TS">Tiến sĩ (TS)</option>
                                    <option value="ThS">Thạc sĩ (ThS)</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Lưu thay đổi</button>
                        <a th:href="@{/dashboard}" class="btn btn-secondary w-100 mt-2">Quay lại</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
