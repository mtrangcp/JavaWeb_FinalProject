<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt lịch tư vấn</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">📅 Đặt lịch tư vấn học thuật</h5>
                </div>
                <div class="card-body">
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/student/booking}" th:object="${bookingDTO}" method="post">

                        <!-- Chọn Khoa -->
                        <div class="mb-3">
                            <label class="form-label">Khoa/Ngành <span class="text-danger">*</span></label>
                            <select class="form-select" id="departmentSelect" onchange="loadLecturers(this.value)">
                                <option value="">-- Chọn Khoa/Ngành --</option>
                                <option th:each="dept : ${departments}"
                                        th:value="${dept.id}"
                                        th:text="${dept.name}">
                                </option>
                            </select>
                        </div>


                        <div class="mb-3">
                            <label class="form-label">Giảng viên <span class="text-danger">*</span></label>
                            <select th:field="*{lecturerId}" class="form-select"
                                    th:classappend="${#fields.hasErrors('lecturerId')} ? 'is-invalid'"
                                    id="lecturerSelect">
                                <option value="">-- Chọn giảng viên --</option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{lecturerId}"></div>
                        </div>


                        <div class="mb-3">
                            <label class="form-label">Ngày & Giờ tư vấn <span class="text-danger">*</span></label>
                            <input type="datetime-local"
                                   th:field="*{scheduledTime}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('scheduledTime')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{scheduledTime}"></div>
                        </div>


                        <div class="mb-3">
                            <label class="form-label">Ghi chú</label>
                            <textarea th:field="*{note}" class="form-control" rows="3"
                                      placeholder="Mô tả vấn đề bạn cần tư vấn..."></textarea>
                            <div class="invalid-feedback" th:errors="*{note}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Đặt lịch</button>
                        <a th:href="@{/student/dashboard}" class="btn btn-secondary w-100 mt-2">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Load giảng viên theo khoa bằng AJAX
    function loadLecturers(departmentId) {
        const select = document.getElementById('lecturerSelect');
        select.innerHTML = '<option value="">-- Đang tải... --</option>';

        if (!departmentId) {
            select.innerHTML = '<option value="">-- Chọn giảng viên --</option>';
            return;
        }

        fetch('/student/booking/lecturers?departmentId=' + departmentId)
            .then(res => res.json())
            .then(data => {
                select.innerHTML = '<option value="">-- Chọn giảng viên --</option>';
                data.forEach(lecturer => {
                    select.innerHTML += `<option value="${lecturer.id}">${lecturer.name}</option>`;
                });
            });
    }
</script>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
