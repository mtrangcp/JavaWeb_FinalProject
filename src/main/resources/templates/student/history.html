<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hồ sơ học thuật</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>📚 Hồ sơ học thuật của tôi</h5>
        <a th:href="@{/student/dashboard}" class="btn btn-secondary btn-sm">← Quay lại</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-danger"  th:text="${errorMessage}"></div>

    <div th:if="${histories.isEmpty()}" class="alert alert-info">
        Bạn chưa có lịch sử tư vấn nào.
    </div>

    <div th:each="h : ${histories}" class="card mb-3 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>
                🗓️ <strong th:text="${#temporals.format(h.scheduledTime, 'dd/MM/yyyy HH:mm')}"></strong>
            </span>
            <span>
                <span th:if="${h.sessionStatus == 'PENDING'}"
                      class="badge bg-warning text-dark">Chờ xác nhận</span>
                <span th:if="${h.sessionStatus == 'COMPLETED'}"
                      class="badge bg-success">Đã hoàn thành</span>
                <span th:if="${h.sessionStatus == 'CANCELLED'}"
                      class="badge bg-secondary">Đã hủy</span>
            </span>
        </div>
        <div class="card-body">
            <p><strong>Giảng viên:</strong> <span th:text="${h.lecturerName}"></span></p>


            <div th:if="${h.score != null}">
                <p><strong>Điểm đánh giá:</strong>
                    <span th:text="${h.score} + '/10'"></span>
                </p>
                <p><strong>Nhận xét:</strong>
                    <span th:text="${h.comment}"></span>
                </p>
            </div>


            <div th:if="${h.borrowedEquipments != null and !h.borrowedEquipments.isEmpty()}">
                <strong>Thiết bị được cấp:</strong>
                <ul class="mt-1">
                    <li th:each="eq : ${h.borrowedEquipments}">
                        <span th:text="${eq.equipmentName}"></span>
                        — <span th:text="${eq.quantity} + ' ' + ${eq.unit}"></span>
                    </li>
                </ul>
            </div>


            <div th:if="${h.sessionStatus == 'PENDING'}" class="mt-2">
                <form th:action="@{/student/booking/cancel/{id}(id=${h.sessionId})}"
                      method="post"
                      onsubmit="return confirm('Bạn có chắc muốn hủy lịch này không?')">
                    <button type="submit" class="btn btn-danger btn-sm">
                        ❌ Hủy lịch
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
