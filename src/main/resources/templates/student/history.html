<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hồ sơ học thuật</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container py-4">
    <h5>📚 Hồ sơ học thuật của tôi</h5>

    <div th:if="${histories.isEmpty()}" class="alert alert-info">
        Bạn chưa có lịch sử tư vấn nào.
    </div>

    <div th:each="h : ${histories}" class="card mb-3 shadow-sm">
        <div class="card-header d-flex justify-content-between">
            <span>🗓️ <strong th:text="${#temporals.format(h.scheduledTime, 'dd/MM/yyyy HH:mm')}"></strong></span>
            <span>
                <span th:if="${h.sessionStatus == 'PENDING'}"   class="badge bg-warning">Chờ xác nhận</span>
                <span th:if="${h.sessionStatus == 'COMPLETED'}" class="badge bg-success">Đã hoàn thành</span>
                <span th:if="${h.sessionStatus == 'CANCELLED'}" class="badge bg-secondary">Đã hủy</span>
            </span>
        </div>
        <div class="card-body">
            <p><strong>Giảng viên:</strong> <span th:text="${h.lecturerName}"></span></p>

            <div th:if="${h.score != null}">
                <p><strong>Điểm đánh giá:</strong> <span th:text="${h.score} + '/10'"></span></p>
                <p><strong>Nhận xét:</strong> <span th:text="${h.comment}"></span></p>
            </div>

            <div th:if="${h.borrowedEquipments != null and !h.borrowedEquipments.isEmpty()}">
                <strong>Thiết bị được cấp:</strong>
                <ul class="mt-1">
                    <li th:each="eq : ${h.borrowedEquipments}">
                        <span th:text="${eq.equipmentName}"></span>
                        — <span th:text="${eq.quantity} + ' ' + ${eq.unit}"></span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <a th:href="@{/student/dashboard}" class="btn btn-secondary">← Quay lại</a>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
