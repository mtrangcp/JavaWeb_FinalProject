<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Thiết bị</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>🛠️ Danh sách Thiết bị</h5>
        <a th:href="@{/admin/equipment/add}" class="btn btn-success">+ Thêm thiết bị</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <!-- Tìm kiếm -->
    <form th:action="@{/admin/equipment}" method="get" class="mb-3 d-flex gap-2">
        <input type="text" name="keyword" th:value="${keyword}"
               class="form-control" placeholder="Tìm theo tên thiết bị...">
        <button type="submit" class="btn btn-primary">Tìm</button>
        <a th:href="@{/admin/equipment}" class="btn btn-secondary">Reset</a>
    </form>


    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Tên thiết bị</th>
            <th>Mô tả</th>
            <th>Số lượng</th>
            <th>Đơn vị</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item, stat : ${equipmentPage.content}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${item.name}"></td>
            <td th:text="${item.description}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.unit}"></td>
            <td>
                <span th:if="${item.status.name() == 'AVAILABLE'}"
                      class="badge bg-success">Còn hàng</span>
                <span th:if="${item.status.name() == 'UNAVAILABLE'}"
                      class="badge bg-secondary">Ngừng cung cấp</span>
            </td>
            <td>
                <a th:href="@{/admin/equipment/edit/{id}(id=${item.id})}"
                   class="btn btn-warning btn-sm">Sửa</a>

                <form th:action="@{/admin/equipment/delete/{id}(id=${item.id})}"
                      method="post" style="display:inline"
                      onsubmit="return confirm('Xác nhận xóa thiết bị này?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>
            </td>
        </tr>
        <tr th:if="${equipmentPage.content.isEmpty()}">
            <td colspan="7" class="text-center text-muted">Không có thiết bị nào.</td>
        </tr>
        </tbody>
    </table>

    <!-- Phân trang -->
    <nav th:if="${equipmentPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:each="i : ${#numbers.sequence(0, equipmentPage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/equipment(page=${i}, keyword=${keyword})}"
                   th:text="${i + 1}"></a>
            </li>
        </ul>
    </nav>

    <a th:href="@{/admin/dashboard}" class="btn btn-secondary">← Quay lại Dashboard</a>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
