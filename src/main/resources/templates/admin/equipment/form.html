<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Thiết bị</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">

                    <h5 class="mb-0"
                        th:text="${equipmentDTO.id != null} ? '✏️ Sửa thiết bị' : '➕ Thêm thiết bị'">
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="${equipmentDTO.id != null}
                                ? @{/admin/equipment/edit/{id}(id=${equipmentDTO.id})}
                                : @{/admin/equipment/add}"
                          th:object="${equipmentDTO}" method="post">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label">Tên thiết bị <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số lượng <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{quantity}" class="form-control" min="0"
                                   th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{quantity}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Đơn vị tính <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{unit}" class="form-control"
                                   placeholder="VD: Cái, Bộ, Chiếc..."
                                   th:classappend="${#fields.hasErrors('unit')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{unit}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Trạng thái</label>
                            <select th:field="*{status}" class="form-select">
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s == T(com.btvn.projectfinal.model.entity.Equipment.EquipmentStatus).AVAILABLE ? 'Còn hàng' : 'Ngừng cung cấp'}">
                                </option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Lưu</button>
                        <a th:href="@{/admin/equipment}" class="btn btn-secondary w-100 mt-2">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
